services:
  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    volumes:
      - blindvault-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: blindvault
      POSTGRES_USER: blindvault
      POSTGRES_PASSWORD: ${PG_PASSWORD:-blindvault_default_pg_pass}
    volumes:
      - blindvault-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blindvault"]
      interval: 5s
      retries: 5

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-true}
    restart: unless-stopped
    expose:
      - "8001"

  backend:
    build:
      context: .
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-true}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      sandbox:
        condition: service_started
    env_file: .env
    volumes:
      - ./.env:/app/.env    # 挂载宿主机 .env，使 UI 保存的配置在容器重建后持久化
    environment:
      - BLINDVAULT_ENCRYPTION_KEY=${BLINDVAULT_ENCRYPTION_KEY}
      - REDIS_URL=redis://redis:6379/0
      - BLINDVAULT_REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://blindvault:${PG_PASSWORD:-blindvault_default_pg_pass}@postgres:5432/blindvault
      - BLINDVAULT_DATABASE_URL=postgresql://blindvault:${PG_PASSWORD:-blindvault_default_pg_pass}@postgres:5432/blindvault
      - SANDBOX_URL=http://sandbox:8001
      - BLINDVAULT_SANDBOX_URL=http://sandbox:8001

  frontend:
    build:
      context: ./frontend
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-true}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  blindvault-redis:
  blindvault-pg:
