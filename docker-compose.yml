services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - blindvault-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: blindvault
      POSTGRES_USER: blindvault
      POSTGRES_PASSWORD: ${PG_PASSWORD:-blindvault_default_pg_pass}
    volumes:
      - blindvault-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blindvault"]
      interval: 5s
      retries: 5

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    restart: unless-stopped

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      sandbox:
        condition: service_started
    environment:
      - BLINDVAULT_ENCRYPTION_KEY=${BLINDVAULT_ENCRYPTION_KEY}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://blindvault:${PG_PASSWORD:-blindvault_default_pg_pass}@postgres:5432/blindvault
      - SANDBOX_URL=http://sandbox:8001
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://backend:8000

volumes:
  blindvault-redis:
  blindvault-pg:
